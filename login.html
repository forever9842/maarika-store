<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <title>Login - Maarika Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
  body{
  margin:0;
  padding:0;
  font-family:'Poppins', sans-serif;
}

/* ===== HEADER FULL WIDTH ===== */
header{
  width:100%;
  background:linear-gradient(90deg,#6b0f2f,#c94a6a);
  padding:12px 16px;
  color:white;
  display:flex;
  align-items:center;
  position:relative;
}

/* LEFT BACK BUTTON */
.back-btn{
  position:absolute;
  left:12px;
  width:36px;
  height:36px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  cursor:pointer;
}

/* CENTER LOGO */
.logo{
  color:white;
  font-size:30px;
  font-weight:700;
  text-align:center;
  flex:1;
}

    .card{
  background:white;
  width:92%;
  max-width:360px;
  margin:50px auto;
  padding:22px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

    input{
  width:100%;
  padding:12px;
  margin:12px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:15px;
  box-sizing:border-box;
}

    button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:25px;
  background:#6b0f2f;
  color:white;
  font-size:16px;
  margin-top:12px;
  cursor:pointer;
}

    button:hover{
      background:#c94a6a;
    }
  </style>
</head>

<body>

<header>
  <div class="back-btn" onclick="goBack()">⬅</div>
  <div class="logo">Maarika store </div>
</header>

<div class="card">
  <h2>Email Login</h2>

  <input type="email" id="email" placeholder="Enter your email">
  <input type="password" id="password" placeholder="Enter password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Create Account</button>

<hr style="margin:18px 0;">

<button onclick="googleLogin()" style="background:white;color:#444;border:1px solid #ddd;">
  🔵 Continue with Google
</button>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  GoogleAuthProvider, 
  signInWithRedirect,
  getRedirectResult
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBa8Sb8mkeGrDDmE540cBkz5ntgLZ4icUU",
  authDomain: "maarikastore-b11b9.firebaseapp.com",
  projectId: "maarikastore-b11b9",
  storageBucket: "maarikastore-b11b9.firebasestorage.app",
  messagingSenderId: "547356607178",
  appId: "1:547356607178:web:aa7773d827dbad99726a33",
  measurementId: "G-T12QF2E2FF"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

getRedirectResult(auth)
.then((result) => {
  if(result){
    alert("Google Login Successful 🎉");
    window.location.href = "index.html";
  }
})
.catch((error) => {
  alert(error.message);
});

window.login = function(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  // Email validation
  if(email === ""){
    alert("Please enter email");
    return;
  }

  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
  alert("Please enter valid email address");
  return;
}

  // Password validation
  if(password === ""){
    alert("Please enter password");
    return;
  }

  if(password.length < 6){
    alert("Password must be at least 6 characters");
    return;
  }

  // Firebase Login
  signInWithEmailAndPassword(auth, email, password)
  .then(()=>{
    alert("Login Successful 🎉");
    window.location.href="index.html";
  })
  .catch((error)=>{

  if(
    error.code === "auth/user-not-found" ||
    error.code === "auth/invalid-credential"
  ){
    alert("Account not found. Please create account first.");
  }
  else if(error.code === "auth/wrong-password"){
    alert("Wrong password.");
  }
  else{
    alert(error.message);
  }

});
}
window.signup = function(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(email === ""){
    alert("Please enter email");
    return;
  }

  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    alert("Please enter valid email");
    return;
  }

  if(password === ""){
    alert("Please enter password");
    return;
  }

  if(password.length < 6){
    alert("Password must be at least 6 characters");
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
  .then(()=>{
    alert("Account Created Successfully 🎉");
  })
  .catch((error)=>{

  if(
    error.code === "auth/user-not-found" ||
    error.code === "auth/invalid-credential"
  ){
    alert("Account not found. Please create account first.");
  }
  else if(error.code === "auth/wrong-password"){
    alert("Wrong password.");
  }
  else{
    alert(error.message);
  }

});
}

window.googleLogin = function(){

  const provider = new GoogleAuthProvider();
  signInWithRedirect(auth, provider);

}

</script>

<script>
function goBack(){
  window.location.href="index.html";
}
</script>

</body>
</html>
