:root{--pink:#fdecef;--maroon:#6b0f2f;}
body{background:#fff;color:#333;}

header{
  background:linear-gradient(90deg,#6b0f2f,#c94a6a);

.logo{color:white;font-size:30px;font-weight:700;text-align:center;flex:1;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:25px;}

.img-

.img-box{
  background:#fff5f8;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
}

.img-box img{
  width:100%;
  height:auto;
  object-fit:contain;
  border-radius:10px;
}

.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{padding:9px;border-radius:18px;font-size:13px;color:white;text-decoration:none;font-weight:600;}
.wa{background:#25D366;}
.amazon{background:#111;}
.flipkart{background:#2874f0;}
.meesho{background:#e91e63;}

footer{
  background:linear-gradient(90deg,#6b0f2f,#3a081a);
  color:white;text-align:center;padding:18px 10px;margin-top:40px;
}

.side-menu{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#fdecef;
  padding:20px;
  transition:.4s;
  z-index:2000;
}
.side-menu.active{ left:0; }

.side-menu a{
  display:block;
  padding:12px 0;
  color:#6b0f2f;
  text-decoration:none;
  font-weight:600;
}

.close-btn{
  font-size:22px;
  cursor:pointer;
  color:#6b0f2f;
  margin-bottom:20px;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:1500;
}
.overlay.show{ display:block; }

.img-box img{
  width:100%;
  height:100%;
  object-fit:contain;
  cursor:pointer;
}

#viewer{
  position:fixed;
  inset:0;
  background:radial-gradient(circle, rgba(255,255,255,0.1), rgba(107,15,47,0.95));
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
#viewer img{
  max-width:90%;
  max-height:80%;
  border-radius:18px;
}
.close-viewer{
  position:absolute;
  top:20px;
  right:20px;
  background:white;
  color:#6b0f2f;
  width:45px;height:45px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
}
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#6b0f2f;
  color:white;
  width:55px;height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  cursor:pointer;
}
.left{left:20px;}
.right{right:20px;}
</style>
</head>

<script>
function openMenu(){
  document.getElementById("menu").classList.add("active");
  document.getElementById("overlay").classList.add("show");
}

function closeMenu(){
  document.getElementById("menu").classList.remove("active");
  document.getElementById("overlay").classList.remove("show");
}
</script>
<script>
let images = [];
let currentIndex = 0;

function openViewer(gallery){
  images = gallery;
  currentIndex = 0;
  document.getElementById("viewer").style.display="flex";
  document.getElementById("viewer-img").src = images[currentIndex];
}
function closeViewer(){
  document.getElementById("viewer").style.display="none";
}
function nextImg(){
  currentIndex = (currentIndex+1) % images.length;
  document.getElementById("viewer-img").src = images[currentIndex];
}
function prevImg(){
  currentIndex = (currentIndex-1+images.length) % images.length;
  document.getElementById("viewer-img").src = images[currentIndex];
}
</script>
